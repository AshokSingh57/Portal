<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Portal</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .main-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 0;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            max-width: 450px;
            width: 100%;
            margin: 20px;
        }

        .auth-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .auth-body {
            padding: 30px;
        }

        .form-control {
            border-radius: 8px;
            border: 2px solid #e9ecef;
            padding: 12px 16px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }

        .form-control.is-valid { border-color: #198754; }
        .form-control.is-invalid { border-color: #dc3545; }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-google {
            background: #db4437;
            border: none;
            color: white;
            border-radius: 8px;
            padding: 12px 24px;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-google:hover {
            background: #c23321;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(219, 68, 55, 0.4);
        }

        .alert { border-radius: 8px; border: none; }

        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #dee2e6;
        }

        .divider span {
            background: white;
            padding: 0 15px;
            color: #6c757d;
            font-size: 14px;
        }

        .form-text { font-size: 12px; }

        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            font-size: 14px;
            opacity: 0.8;
            transition: opacity 0.3s ease;
        }

        .back-home:hover { opacity: 1; color: white; }

        .password-requirements { font-size: 12px; color: #6c757d; margin-top: 5px; }
        .requirement { display: flex; align-items: center; margin: 2px 0; }
        .requirement i { width: 16px; margin-right: 5px; }
        .requirement.valid { color: #198754; }
        .requirement.invalid { color: #dc3545; }
    </style>
</head>
<body>
    <a th:href="@{/}" class="back-home">
        <i class="fas fa-arrow-left me-1"></i>Back to Home
    </a>

    <div class="main-container">
        <div class="auth-card">
            <div class="auth-header">
                <h3 class="mb-0">
                    <i class="fas fa-user-plus me-2"></i>Create Account
                </h3>
                <p class="mt-2 mb-0 opacity-75">Join Portal today</p>
            </div>

            <div class="auth-body">
                <!-- Error Messages -->
                <div class="alert alert-danger" th:if="${error}">
                    <i class="fas fa-exclamation-triangle me-2"></i>
                    <span th:text="${error}"></span>
                </div>

                <!-- Registration Form -->
                <form th:action="@{/register}" method="post" id="registrationForm">
                    <div class="mb-3">
                        <label for="fullName" class="form-label">
                            <i class="fas fa-user me-1"></i>Full Name
                        </label>
                        <input type="text" class="form-control" id="fullName" name="fullName" required
                               placeholder="Enter your full name">
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">
                            <i class="fas fa-envelope me-1"></i>Email Address
                        </label>
                        <input type="email" class="form-control" id="email" name="email" required
                               placeholder="Enter your email">
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock me-1"></i>Password
                        </label>
                        <input type="password" class="form-control" id="password" name="password" required
                               placeholder="Create a password">
                        <div class="password-requirements" id="passwordRequirements">
                            <div class="requirement" id="lengthReq">
                                <i class="fas fa-times"></i>At least 8 characters
                            </div>
                            <div class="requirement" id="numberReq">
                                <i class="fas fa-times"></i>At least 1 number
                            </div>
                            <div class="requirement" id="specialReq">
                                <i class="fas fa-times"></i>At least 1 special character
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="confirmPassword" class="form-label">
                            <i class="fas fa-lock me-1"></i>Confirm Password
                        </label>
                        <input type="password" class="form-control" id="confirmPassword" required
                               placeholder="Confirm your password">
                        <div class="invalid-feedback" id="confirmPasswordFeedback">Passwords do not match</div>
                    </div>

                    <button type="submit" class="btn btn-primary mb-3" id="registerButton" disabled>
                        <i class="fas fa-user-plus me-2"></i>Create Account
                    </button>
                </form>

                <!-- Divider -->
                <div class="divider">
                    <span>or</span>
                </div>

                <!-- Google OAuth Registration -->
                <a href="http://localhost:8081/api/oauth2/authorization/google" class="btn btn-google mb-3">
                    <i class="fab fa-google me-2"></i>Sign up with Google
                </a>

                <!-- Login Link -->
                <div class="text-center">
                    <p class="form-text mb-0">
                        Already have an account?
                        <a th:href="@{/login}" class="text-decoration-none">Sign in here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const fullNameInput = document.getElementById('fullName');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const registerButton = document.getElementById('registerButton');

        const lengthReq = document.getElementById('lengthReq');
        const numberReq = document.getElementById('numberReq');
        const specialReq = document.getElementById('specialReq');

        function updateRequirement(element, isValid) {
            const icon = element.querySelector('i');
            if (isValid) {
                element.classList.add('valid');
                element.classList.remove('invalid');
                icon.className = 'fas fa-check';
            } else {
                element.classList.add('invalid');
                element.classList.remove('valid');
                icon.className = 'fas fa-times';
            }
        }

        function validatePassword(password) {
            const hasLength = password.length >= 8;
            const hasNumber = /\d/.test(password);
            const hasSpecial = /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password);

            updateRequirement(lengthReq, hasLength);
            updateRequirement(numberReq, hasNumber);
            updateRequirement(specialReq, hasSpecial);

            return hasLength && hasNumber && hasSpecial;
        }

        function validateForm() {
            const isFullNameValid = fullNameInput.value.trim().length > 0;
            const isEmailValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput.value);
            const isPasswordValid = validatePassword(passwordInput.value);
            const isConfirmPasswordValid = passwordInput.value === confirmPasswordInput.value && passwordInput.value.length > 0;

            registerButton.disabled = !(isFullNameValid && isEmailValid && isPasswordValid && isConfirmPasswordValid);
        }

        passwordInput.addEventListener('input', function() {
            validatePassword(this.value);
            validateForm();
        });

        confirmPasswordInput.addEventListener('input', function() {
            if (passwordInput.value !== this.value) {
                this.classList.add('is-invalid');
            } else {
                this.classList.remove('is-invalid');
                this.classList.add('is-valid');
            }
            validateForm();
        });

        fullNameInput.addEventListener('input', validateForm);
        emailInput.addEventListener('input', validateForm);
    </script>
</body>
</html>
